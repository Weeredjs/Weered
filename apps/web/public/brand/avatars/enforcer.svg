<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Big enforcer / muscle -->
  <rect width="128" height="128" rx="16" fill="#0B0F1A"/>
  <g fill="#E2E8F0">
    <!-- Head (smaller relative to body) -->
    <ellipse cx="64" cy="42" rx="13" ry="15"/>
    <!-- Buzz cut flat top -->
    <rect x="51" y="26" width="26" height="5" rx="2"/>
    <!-- Stern expression -->
    <rect x="54" y="40" width="6" height="3" rx="1" fill="#0B0F1A"/>
    <rect x="68" y="40" width="6" height="3" rx="1" fill="#0B0F1A"/>
    <rect x="58" y="49" width="12" height="2" rx="1" fill="#0B0F1A"/>
    <!-- Massive shoulders and body -->
    <path d="M20 105c0-22 18-38 44-38s44 16 44 38v10H20V105z"/>
    <!-- Tank top neckline -->
    <path d="M52 67c4 4 8 6 12 6s8-2 12-6" stroke="#0B0F1A" stroke-width="3" fill="none"/>
    <!-- Chain necklace -->
    <circle cx="64" cy="74" r="4" stroke="#EAB308" stroke-width="1.5" fill="none"/>
    <circle cx="64" cy="74" r="1.5" fill="#EAB308"/>
    <!-- Arm definition lines -->
    <line x1="35" y1="75" x2="30" y2="100" stroke="#0B0F1A" stroke-width="2" opacity=".3"/>
    <line x1="93" y1="75" x2="98" y2="100" stroke="#0B0F1A" stroke-width="2" opacity=".3"/>
  </g>
</svg>