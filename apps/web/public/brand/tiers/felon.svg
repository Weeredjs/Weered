<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="100%" stop-color="#0d0703"/>
    </linearGradient>
    <pattern id="caution" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(45)">
      <rect x="0" y="0" width="20" height="40" fill="#fdba74" opacity="0.07"/>
      <rect x="20" y="0" width="20" height="40" fill="transparent"/>
    </pattern>
  </defs>
  <rect width="600" height="150" fill="url(#bg)"/>
  <rect width="600" height="150" fill="url(#caution)"/>
  <!-- Booking-card grid lines, faint, top + bottom -->
  <g stroke="#fdba74" stroke-width="0.5" opacity="0.22">
    <line x1="0" y1="20" x2="600" y2="20"/>
    <line x1="0" y1="130" x2="600" y2="130"/>
  </g>
  <!-- Number stencil right side, very faint -->
  <text x="540" y="105" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        fill="#fdba74" opacity="0.06" text-anchor="end" letter-spacing="6">7-9-3</text>
</svg>
