<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2738"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#3b82f6" stroke-width="0.7" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="600" height="150" fill="url(#bg)"/>
  <rect width="600" height="150" fill="url(#hatch)"/>
  <rect x="0" y="0" width="600" height="2" fill="#60a5fa" opacity="0.35"/>
  <rect x="0" y="148" width="600" height="2" fill="#60a5fa" opacity="0.35"/>
