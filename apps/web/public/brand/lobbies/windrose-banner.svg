<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 620" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Stormy sky -->
    <linearGradient id="sky" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#050812" />
      <stop offset="35%"  stop-color="#0e1826" />
      <stop offset="70%"  stop-color="#162840" />
      <stop offset="100%" stop-color="#1a2e48" />
    </linearGradient>
    <!-- Distant sea -->
    <linearGradient id="sea" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#1a2e48" />
      <stop offset="50%"  stop-color="#0e1826" />
      <stop offset="100%" stop-color="#050812" />
    </linearGradient>
    <!-- Moonlight glow -->
    <radialGradient id="moonglow" cx="72%" cy="28%" r="32%">
      <stop offset="0%"   stop-color="#e8c48a" stop-opacity="0.18" />
      <stop offset="50%"  stop-color="#c9a066" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#c9a066" stop-opacity="0" />
    </radialGradient>
    <!-- Left atmospheric haze -->
    <radialGradient id="leftHaze" cx="15%" cy="60%" r="45%">
      <stop offset="0%"   stop-color="#a33d3d" stop-opacity="0.14" />
      <stop offset="60%"  stop-color="#8b2e2e" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#8b2e2e" stop-opacity="0" />
    </radialGradient>
    <!-- Horizon glow -->
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8c48a" stop-opacity="0" />
      <stop offset="50%"  stop-color="#c9a066" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#c9a066" stop-opacity="0" />
    </linearGradient>
    <!-- Rough-edge cloud mask -->
    <filter id="turb">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="4" />
      <feDisplacementMap in="SourceGraphic" scale="18" />
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="420" fill="url(#sky)" />
  <!-- Sea -->
  <rect y="420" width="1920" height="200" fill="url(#sea)" />

  <!-- Atmospheric glow layers -->
  <rect width="1920" height="620" fill="url(#moonglow)" />
  <rect width="1920" height="620" fill="url(#leftHaze)" />

  <!-- Moon -->
  <circle cx="1380" cy="170" r="48" fill="#e8c48a" opacity="0.55" />
  <circle cx="1380" cy="170" r="42" fill="#f2d4a1" opacity="0.75" />
  <circle cx="1372" cy="164" r="38" fill="#e8c48a" opacity="0" stroke="#0e1826" stroke-width="2" />

  <!-- Storm clouds (big soft blobs with noise-displaced edges) -->
  <g filter="url(#turb)" opacity="0.85">
    <ellipse cx="300"  cy="120" rx="380" ry="90"  fill="#0a101c" />
    <ellipse cx="920"  cy="80"  rx="520" ry="70"  fill="#0a101c" />
    <ellipse cx="1560" cy="110" rx="420" ry="88"  fill="#0a101c" />
    <ellipse cx="680"  cy="210" rx="340" ry="60"  fill="#15233a" opacity="0.65" />
    <ellipse cx="1260" cy="230" rx="420" ry="72"  fill="#15233a" opacity="0.55" />
  </g>

  <!-- Horizon line -->
  <rect x="0" y="416" width="1920" height="8" fill="url(#horizon)" />
  <line x1="0" y1="420" x2="1920" y2="420" stroke="#c9a066" stroke-width="0.8" opacity="0.28" />

  <!-- Distant ships (silhouettes at horizon) -->
  <!-- Ship 1 — left, tall galleon -->
  <g transform="translate(260 372)" fill="#050812" opacity="0.82">
    <rect x="0" y="34" width="78" height="12" />
    <polygon points="6,34 72,34 66,42 12,42" />
    <!-- masts -->
    <rect x="18" y="0" width="1.6" height="40" />
    <rect x="40" y="-4" width="1.8" height="44" />
    <rect x="62" y="0" width="1.6" height="40" />
    <!-- sails -->
    <path d="M8 4 Q18 8 30 4 L30 28 Q18 30 8 28 Z" />
    <path d="M30 0 Q42 4 54 0 L54 30 Q42 32 30 30 Z" />
    <path d="M54 4 Q62 8 74 4 L74 28 Q62 30 54 28 Z" />
    <!-- pennant -->
    <line x1="40" y1="-4" x2="48" y2="-1" stroke="#a33d3d" stroke-width="0.9" />
  </g>

  <!-- Ship 2 — far right, smaller -->
  <g transform="translate(1540 392)" fill="#050812" opacity="0.68">
    <rect x="0" y="20" width="56" height="8" />
    <polygon points="4,20 52,20 48,26 8,26" />
    <rect x="14" y="-2" width="1.4" height="24" />
    <rect x="32" y="-4" width="1.6" height="26" />
    <path d="M6 2 Q14 4 22 2 L22 18 Q14 20 6 18 Z" />
    <path d="M22 0 Q32 2 42 0 L42 18 Q32 20 22 18 Z" />
  </g>

  <!-- Ship 3 — mid distance center-left -->
  <g transform="translate(720 380)" fill="#050812" opacity="0.55">
    <rect x="0" y="26" width="48" height="8" />
    <rect x="22" y="6" width="1.2" height="22" />
    <path d="M14 10 Q22 12 30 10 L30 24 Q22 26 14 24 Z" />
  </g>

  <!-- Wave strokes -->
  <g stroke="#c9a066" fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M 0 472 Q 160 464 320 472 T 640 472 T 960 472 T 1280 472 T 1600 472 T 1920 472" stroke-width="1.2" />
    <path d="M 0 510 Q 140 502 280 510 T 560 510 T 840 510 T 1120 510 T 1400 510 T 1680 510 T 1960 510" stroke-width="0.9" opacity="0.7" />
    <path d="M 0 548 Q 120 542 240 548 T 480 548 T 720 548 T 960 548 T 1200 548 T 1440 548 T 1680 548 T 1920 548" stroke-width="0.7" opacity="0.5" />
    <path d="M 0 586 Q 100 582 200 586 T 400 586 T 600 586 T 800 586 T 1000 586 T 1200 586 T 1400 586 T 1600 586 T 1800 586 T 1920 586" stroke-width="0.6" opacity="0.35" />
  </g>

  <!-- Sail mark (brand logo top-left) -->
  <g transform="translate(60 60)">
    <path d="M32 10 Q 56 40 92 64 L 34 72 Z" fill="#e8c48a" opacity="0.9" />
    <rect x="22" y="82" width="70" height="6" rx="1" fill="#e8c48a" opacity="0.9" />
  </g>

  <!-- Subtle compass watermark far right -->
  <g transform="translate(1720 460)" opacity="0.12">
    <circle cx="0" cy="0" r="68" fill="none" stroke="#e8c48a" stroke-width="1" />
    <circle cx="0" cy="0" r="58" fill="none" stroke="#e8c48a" stroke-width="0.6" />
    <path d="M0 -68 L4 0 L0 2 L-4 0 Z" fill="#e8c48a" />
    <path d="M0 68 L4 0 L0 -2 L-4 0 Z" fill="#e8c48a" opacity="0.6" />
    <path d="M68 0 L0 4 L-2 0 L0 -4 Z" fill="#e8c48a" opacity="0.8" />
    <path d="M-68 0 L0 4 L2 0 L0 -4 Z" fill="#e8c48a" opacity="0.8" />
    <circle cx="0" cy="0" r="4" fill="#0e1826" stroke="#e8c48a" stroke-width="0.8" />
  </g>

  <!-- Top brass rope strip -->
  <rect x="0" y="0" width="1920" height="3" fill="#c9a066" opacity="0.65" />
  <rect x="0" y="5" width="1920" height="1" fill="#8a6b3e" opacity="0.45" />

  <!-- Bottom vignette so content stays readable over Weered's opacity overlay -->
  <rect x="0" y="520" width="1920" height="100" fill="url(#sea)" opacity="0.6" />
</svg>
