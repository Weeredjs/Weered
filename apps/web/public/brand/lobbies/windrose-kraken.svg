<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" fill="none">
  <!-- Curving kraken tentacle rising from bottom-left, suckers along inner edge -->
  <defs>
    <linearGradient id="krk" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#1a0d1f" stop-opacity="1" />
      <stop offset="55%" stop-color="#2d1b3d" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#3a2750" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <!-- Tentacle body (a sweeping curl) -->
  <path d="M 0 480
           C 20 420, 60 360, 80 280
           C 92 230, 92 180, 70 140
           C 50 100, 30 80, 10 70
           L 10 60
           C 30 55, 70 70, 110 100
           C 150 130, 180 180, 200 250
           C 212 300, 210 360, 190 420
           C 175 455, 140 470, 100 475
           L 0 480 Z"
        fill="url(#krk)" opacity="0.9" />
  <!-- Suckers on the inside curl (tiny discs) -->
  <g fill="#5a3d6d" opacity="0.6">
    <circle cx="70" cy="420" r="6" />
    <circle cx="85" cy="380" r="5.5" />
    <circle cx="95" cy="340" r="5" />
    <circle cx="100" cy="300" r="4.8" />
    <circle cx="98" cy="260" r="4.5" />
    <circle cx="85" cy="220" r="4.2" />
    <circle cx="72" cy="190" r="4" />
    <circle cx="58" cy="165" r="3.6" />
    <circle cx="45" cy="140" r="3.2" />
    <circle cx="34" cy="120" r="2.8" />
    <circle cx="26" cy="105" r="2.4" />
  </g>
  <!-- Inner sucker highlights -->
  <g fill="#8b6e9e" opacity="0.5">
    <circle cx="70" cy="420" r="2" />
    <circle cx="85" cy="380" r="1.8" />
    <circle cx="95" cy="340" r="1.6" />
    <circle cx="100" cy="300" r="1.5" />
    <circle cx="98" cy="260" r="1.4" />
    <circle cx="85" cy="220" r="1.3" />
    <circle cx="72" cy="190" r="1.2" />
    <circle cx="58" cy="165" r="1.1" />
  </g>
  <!-- Tip curl -->
  <path d="M 10 60 C 5 50, 15 40, 28 42 C 38 44, 40 55, 32 58 Z" fill="#3a2750" opacity="0.7" />
</svg>
