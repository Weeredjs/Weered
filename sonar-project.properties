# SonarCloud configuration for Weered (web + api + shared).
#
# IMPORTANT: this file only governs CI-BASED analysis. Turn OFF SonarCloud
# "Automatic Analysis" (Project > Administration > Analysis Method) or these
# settings (scope, coverage, suppressions) are ignored and the whole repo
# (mobile, desktop, tooling) gets graded instead.
sonar.projectKey=Weeredjs_Weered
sonar.organization=weeredjs
sonar.projectName=Weered
sonar.sourceEncoding=UTF-8

# Analyse the web + api + shared TypeScript. Mobile (Expo) and desktop (Tauri)
# are separate stacks; scope them in later as their own analysis if wanted.
sonar.sources=apps/api/src,apps/web/app,apps/web/components,apps/web/lib,packages/shared/src
sonar.tests=apps/api/test,apps/web/e2e

# Pin the Python version (silences the "analyzed as all Python 3 versions" warning).
sonar.python.version=3.11

# Point the TypeScript analyzer at ONLY the in-scope tsconfigs. Without this,
# Sonar auto-discovers apps/mobile/tsconfig.json (which extends
# expo/tsconfig.base), fails to resolve it, and degrades the whole TS analysis
# (the "referenced tsconfig.json was not found" warning).
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json,packages/shared/tsconfig.json

# Generated / vendored / build output / non-source — out of analysis entirely.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.d.ts,**/prisma/migrations/**,**/_drain_baseline/**,apps/web/public/**

# Coverage (lcov produced by `vitest --coverage` in CI for unit + integration;
# web lcov from the web vitest run).
sonar.javascript.lcov.reportPaths=apps/api/coverage/unit/lcov.info,apps/api/coverage/integration/lcov.info,apps/web/coverage/lcov.info

# Excluded from the COVERAGE denominator (still analysed for bugs/smells):
# entrypoint wiring, external-IO pollers/feeds, SMTP, and the boot inline-script
# are integration/e2e territory, not unit-testable — so coverage % reflects the
# code that genuinely can and should be unit-tested.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/test/**,apps/web/e2e/**,apps/api/src/index.ts,apps/api/src/lib/presence.ts,apps/api/src/lib/binanceFeed.ts,apps/api/src/lib/email.ts,apps/web/app/layout.tsx

# Inline CSS-in-JS style objects + CSS aren't meaningful duplication.
sonar.cpd.exclusions=**/*.css

# --- Documented, intentional suppressions (kept visible on purpose, not hidden
#     in the SonarCloud UI, so anyone reading the repo sees exactly what and why) ---
sonar.issue.ignore.multicriteria=t1,t2,h1,h2,h3,h4,s1,s2,b1
# t1: "hardcoded credentials" in test fixtures are signed test JWTs / throwaway
#     test users, not real secrets.
sonar.issue.ignore.multicriteria.t1.ruleKey=typescript:S6437
sonar.issue.ignore.multicriteria.t1.resourceKey=apps/api/test/**
# t2: the CI test-database password is a throwaway Postgres service container
#     that only exists for the duration of a CI run.
sonar.issue.ignore.multicriteria.t2.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.t2.resourceKey=.github/workflows/**
# h1-h4: intentional 32-bit hash truncation (`h |= 0`) in the article-id hash.
#     Math.trunc (what the rule wants) would change the hash output and break
#     cross-client id matching. Same small hash function in four places.
sonar.issue.ignore.multicriteria.h1.ruleKey=typescript:S7767
sonar.issue.ignore.multicriteria.h1.resourceKey=apps/api/src/lib/feedWorker.ts
sonar.issue.ignore.multicriteria.h2.ruleKey=typescript:S7767
sonar.issue.ignore.multicriteria.h2.resourceKey=apps/api/src/lib/roomState.ts
sonar.issue.ignore.multicriteria.h3.ruleKey=typescript:S7767
sonar.issue.ignore.multicriteria.h3.resourceKey=apps/web/components/StoryInterceptModal.tsx
sonar.issue.ignore.multicriteria.h4.ruleKey=typescript:S7767
sonar.issue.ignore.multicriteria.h4.resourceKey=apps/web/components/HomeFeed.tsx
# s1-s2: S5725 (subresource integrity) on dynamically-loaded third-party scripts.
#     Cloudflare Turnstile (api.js) and the YouTube IFrame API are living vendor
#     endpoints updated in place; pinning an SRI hash would break the integration
#     on every vendor update. SRI is inapplicable here by design.
sonar.issue.ignore.multicriteria.s1.ruleKey=typescript:S5725
sonar.issue.ignore.multicriteria.s1.resourceKey=apps/web/app/login/page.tsx
sonar.issue.ignore.multicriteria.s2.ruleKey=typescript:S5725
sonar.issue.ignore.multicriteria.s2.resourceKey=apps/web/components/room/RoomStage.tsx
# b1: S4158 "collection can only be empty" on symbolSubscribers. It IS populated,
#     but via dependency injection in sockets/tradingWs.ts (the Map is passed in
#     through opts), so Sonar's per-module flow analysis can't see the .set().
#     The branch is live (clients subscribe -> tradingWs sets -> feed reads).
sonar.issue.ignore.multicriteria.b1.ruleKey=typescript:S4158
sonar.issue.ignore.multicriteria.b1.resourceKey=apps/api/src/lib/binanceFeed.ts
