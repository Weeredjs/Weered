# SonarCloud configuration for Weered (web + api).
# NOTE: set projectKey/organization to match the SonarCloud project you create
# (these are best-guesses from the GitHub org and will need confirming).
sonar.projectKey=Weeredjs_Weered
sonar.organization=weeredjs
sonar.projectName=Weered
sonar.sourceEncoding=UTF-8

# Analyse the web + api + shared TypeScript. Mobile (Expo) and desktop (Tauri)
# are separate stacks; scope them in later as their own analysis if wanted.
sonar.sources=apps/api/src,apps/web/app,apps/web/components,apps/web/lib,packages/shared/src
sonar.tests=apps/api/test,apps/web/e2e

# Generated / vendored / build output / non-source — out of analysis entirely.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.d.ts,**/prisma/migrations/**,**/_drain_baseline/**,apps/web/public/**

# Coverage (lcov produced by `vitest --coverage` in CI for unit + integration;
# web lcov from the web vitest run).
sonar.javascript.lcov.reportPaths=apps/api/coverage/unit/lcov.info,apps/api/coverage/integration/lcov.info,apps/web/coverage/lcov.info

# Excluded from the COVERAGE denominator (still analysed for bugs/smells):
# entrypoint wiring, external-IO pollers/feeds, SMTP, and the boot inline-script
# are integration/e2e territory, not unit-testable — so coverage % reflects the
# code that genuinely can and should be unit-tested.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/test/**,apps/web/e2e/**,apps/api/src/index.ts,apps/api/src/lib/presence.ts,apps/api/src/lib/binanceFeed.ts,apps/api/src/lib/email.ts,apps/web/app/layout.tsx

# Inline CSS-in-JS style objects + CSS aren't meaningful duplication.
sonar.cpd.exclusions=**/*.css
