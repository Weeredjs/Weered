<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Office Control</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0b1220;
        color: #e8eef7;
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #131c2e;
        border: 1px solid #2a3a55;
        border-radius: 16px;
        padding: 26px;
        width: min(93vw, 430px);
        box-shadow: 0 12px 44px rgba(0, 0, 0, 0.45);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 2px;
      }
      .sub {
        color: #8aa0c0;
        font-size: 12px;
        margin: 0 0 18px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 11px;
        font-size: 19px;
        font-weight: 800;
        margin: 0 0 6px;
      }
      .dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        box-shadow: 0 0 10px currentColor;
      }
      .open {
        color: #2ecc71;
      }
      .closed {
        color: #e74c3c;
      }
      .open .dot,
      .closed .dot {
        background: currentColor;
      }
      .sched {
        color: #8aa0c0;
        font-size: 13px;
        margin: 0 0 14px;
        min-height: 16px;
      }
      .recep {
        margin: 0 0 16px;
        padding: 12px 14px;
        border-radius: 11px;
        background: #0e1728;
        border: 1px solid #24314a;
        transition: background 0.2s;
      }
      .recep.alert {
        background: #2a2410;
        border-color: #f2b705;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(242, 183, 5, 0.55);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(242, 183, 5, 0);
        }
      }
      .recep h2 {
        font-size: 11px;
        margin: 0 0 8px;
        color: #8aa0c0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .recep h2 a {
        color: #6f86a8;
        font-weight: 600;
        text-decoration: none;
        font-size: 11px;
      }
      .arr {
        display: flex;
        justify-content: space-between;
        font-size: 13.5px;
        padding: 6px 0;
        border-top: 1px solid #1c2740;
      }
      .arr:first-of-type {
        border-top: 0;
      }
      .none {
        color: #5f7391;
        font-size: 13px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 14px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 10px;
      }
      .b-open {
        background: #2ecc71;
        color: #06210f;
      }
      .b-close {
        background: #e74c3c;
        color: #2a0a06;
      }
      button:active {
        transform: translateY(1px);
      }
      .msg {
        font-size: 12.5px;
        color: #9fb2cf;
        margin-top: 14px;
        min-height: 16px;
      }
      .tok {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid #24314a;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid #2a3a55;
        background: #0b1220;
        color: #e8eef7;
        font-size: 12px;
        margin-top: 6px;
      }
      .hint {
        color: #6f86a8;
        font-size: 11.5px;
        margin-top: 9px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Office Control</h1>
      <p class="sub">East Coast Employee Benefits</p>
      <div id="status" class="status closed">
        <span class="dot"></span><span id="statusText">Loading…</span>
      </div>
      <div class="sched" id="sched"></div>

      <div class="recep" id="recep">
        <h2>
          <span>Reception</span
          ><a
            href="#"
            onclick="
              notify('Test');
              return false;
            "
            >test alert</a
          >
        </h2>
        <div id="arrivals" class="none">No one waiting.</div>
      </div>

      <button class="b-open" onclick="setOpen(true)">Open the office</button>
      <button class="b-close" onclick="setOpen(false)">Close the office</button>
      <div class="msg" id="msg"></div>
      <div class="tok">
        <div class="sub" style="margin: 0">
          Host token (paste once — stored only on this device)
        </div>
        <input id="tok" placeholder="host JWT" autocomplete="off" spellcheck="false" />
        <div class="hint">
          Keep this page open while you're holding hours — you'll get a ping the moment someone
          walks in.
        </div>
      </div>
    </div>
    <script>
      var $ = function (i) {
        return document.getElementById(i);
      };
      var _ut = new URLSearchParams(location.search).get("t");
      if (_ut) {
        localStorage.setItem("office_host_tok", _ut);
      }
      $("tok").value = localStorage.getItem("office_host_tok") || "";
      $("tok").addEventListener("change", function () {
        localStorage.setItem("office_host_tok", $("tok").value.trim());
      });
      function tok() {
        return ($("tok").value || localStorage.getItem("office_host_tok") || "").trim();
      }

      var lastMaxAt = 0,
        primed = false,
        ac = null,
        titleTimer = null;
      function armAudio() {
        if (!ac) {
          try {
            ac = new (window.AudioContext || window.webkitAudioContext)();
          } catch (e) {}
        }
        if (ac && ac.state === "suspended") {
          ac.resume();
        }
      }
      window.addEventListener("click", function () {
        armAudio();
        try {
          if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
          }
        } catch (e) {}
      });
      function beep() {
        try {
          armAudio();
          if (!ac) return;
          var o = ac.createOscillator(),
            g = ac.createGain();
          o.connect(g);
          g.connect(ac.destination);
          o.type = "sine";
          o.frequency.value = 880;
          g.gain.setValueAtTime(0.0001, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.25, ac.currentTime + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.55);
          o.start();
          o.stop(ac.currentTime + 0.6);
        } catch (e) {}
      }
      function flashTitle() {
        var n = 0;
        if (titleTimer) clearInterval(titleTimer);
        titleTimer = setInterval(function () {
          document.title = (n % 2 ? "🔔 " : "") + "Someone is waiting";
          if (++n > 12) {
            clearInterval(titleTimer);
            document.title = "Office Control";
          }
        }, 700);
      }
      function notify(name) {
        try {
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification("Someone's at your office door", {
              body: (name || "A visitor") + " just walked in.",
              tag: "office-walkin",
            });
          }
        } catch (e) {}
        beep();
        flashTitle();
      }
      function ago(ms) {
        var s = Math.floor((Date.now() - ms) / 1000);
        if (s < 60) return s < 5 ? "just now" : s + "s ago";
        var m = Math.floor(s / 60);
        if (m < 60) return m + "m ago";
        return Math.floor(m / 60) + "h ago";
      }
      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function refresh() {
        fetch("/api/office/status")
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            $("status").className = "status " + (j.open ? "open" : "closed");
            $("statusText").textContent = j.open ? "OPEN — visitors can knock" : "CLOSED";
            $("sched").textContent = j.schedule ? "Hours: " + j.schedule : "";
          })
          .catch(function () {
            $("statusText").textContent = "status unavailable";
          });
      }
      function pollWaiting() {
        var t = tok();
        if (!t) {
          return;
        }
        fetch("/api/office/waiting", { headers: { Authorization: "Bearer " + t } })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            if (!j || !j.ok) {
              return;
            }
            var w = j.waiting || [];
            if (w.length === 0) {
              $("arrivals").className = "none";
              $("arrivals").textContent = "No one waiting.";
              $("recep").className = "recep";
            } else {
              var html = "";
              for (var i = w.length - 1; i >= 0; i--) {
                html +=
                  '<div class="arr"><span>' +
                  esc(w[i].name || "Visitor") +
                  '</span><span style="color:#8aa0c0">' +
                  ago(w[i].at) +
                  "</span></div>";
              }
              $("arrivals").className = "";
              $("arrivals").innerHTML = html;
            }
            var mx = 0;
            for (var k = 0; k < w.length; k++) {
              if (w[k].at > mx) mx = w[k].at;
            }
            if (primed && mx > lastMaxAt) {
              $("recep").className = "recep alert";
              notify(w.length ? w[w.length - 1].name : "");
              setTimeout(function () {
                if ($("recep").className.indexOf("alert") >= 0) $("recep").className = "recep";
              }, 9000);
            }
            if (mx > lastMaxAt) lastMaxAt = mx;
            primed = true;
          })
          .catch(function () {});
      }

      function setOpen(open) {
        var t = tok();
        if (!t) {
          $("msg").textContent = "Paste your host token in the box below first.";
          return;
        }
        localStorage.setItem("office_host_tok", t);
        armAudio();
        $("msg").textContent = "…";
        fetch("/api/office/set", {
          method: "POST",
          headers: { Authorization: "Bearer " + t, "Content-Type": "application/json" },
          body: JSON.stringify({ open: open }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { s: r.status, j: j };
            });
          })
          .then(function (o) {
            if (o.j.ok) {
              $("msg").textContent = open ? "Office is now open." : "Office is now closed.";
              refresh();
            } else {
              $("msg").textContent =
                "Error: " +
                (o.j.error || "failed") +
                (o.s === 403 ? "  (token expired — paste a fresh one)" : "");
            }
          })
          .catch(function () {
            $("msg").textContent = "Network error.";
          });
      }
      refresh();
      pollWaiting();
      setInterval(refresh, 15000);
      setInterval(pollWaiting, 8000);
    </script>
  </body>
</html>
