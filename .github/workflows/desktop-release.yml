name: Desktop Release

# Triggers on git tag pushes shaped like `desktop-v0.2.0` so we don't fire
# the workflow on unrelated tags. Manual `workflow_dispatch` is also allowed
# for testing.
on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          # macOS builds intentionally disabled for v0.1.x — see #TODO-mac.
          # Re-enable by adding back macos-latest entries with aarch64 +
          # x86_64 targets. Mac users can use the PWA install path until
          # the native shell ships.

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        # Must run BEFORE setup-node — setup-node@v5 auto-caches pnpm if it
        # finds a lockfile, and needs pnpm already on PATH to do that.
        # Version is read from package.json's "packageManager" field.
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target dir
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      # ── Build only (no release creation) ───────────────────────────
      # tauri-action@v0 doesn't support cross-repo publish (the owner/repo
      # inputs don't exist on this version), so we use it for build+sign only
      # and publish via softprops below.
      - name: Build + bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # Default token is fine — this step doesn't create a release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — REQUIRED for .sig file generation.
          # Without these the auto-updater never gets valid signatures.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          # No tagName / releaseName — tauri-action builds but skips release.
          args: ${{ matrix.args }}

      # ── Publish release to Weeredjs/Weered-releases ─────────────────
      # softprops/action-gh-release@v3 handles cross-repo publishing
      # cleanly. RELEASES_PUBLISH_TOKE has Contents:write on the public
      # releases repo.
      #
      # Each matrix job (ubuntu + windows) uploads its own artifacts to
      # the same release tag. First job creates the release; subsequent
      # jobs add to it (softprops dedupes by filename).
      #
      # Includes .sig sibling files for every installer — these are
      # what /desktop/latest checks before serving an update offer to
      # Tauri clients. Without them, auto-updater returns 204 (no update).
      - name: Publish to Weered-releases (cross-repo)
        uses: softprops/action-gh-release@v3
        with:
          repository: Weeredjs/Weered-releases
          token: ${{ secrets.RELEASES_PUBLISH_TOKE }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: "Weered Desktop ${{ github.event.inputs.tag_name || github.ref_name }}"
          body: |
            Automated build via GitHub Actions.

            See https://weered.ca/desktop for installation instructions.
          draft: false
          prerelease: false
          # Glob captures BOTH installers AND their .sig siblings.
          # .sig presence is what makes Tauri auto-update actually fire.
          # Bare dir globs: softprops' matcher silently fails on literal
          # double-dot suffixes (*.nsis.zip, *.exe.sig), so grab every bundle
          # file per dir (installers + updater .zip + .sig). The API picks what
          # it needs (download installer vs signed .nsis.zip updater bundle).
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*
            apps/desktop/src-tauri/target/release/bundle/msi/*
            apps/desktop/src-tauri/target/release/bundle/appimage/*
            apps/desktop/src-tauri/target/release/bundle/deb/*
            apps/desktop/src-tauri/target/release/bundle/rpm/*
          fail_on_unmatched_files: false

      # softprops' glob silently SKIPS filenames with a double-dot suffix
      # (*.nsis.zip, *.exe.sig) — confirmed: bare nsis/* uploaded only the .exe.
      # So the signed updater bundles never attach. Upload them explicitly with
      # the gh CLI; bash globs handle multi-dot names fine. nullglob -> a glob
      # with no match on this platform expands to nothing (no error).
      - name: Attach updater bundles + signatures (gh CLI)
        shell: bash
        run: |
          set -x
          ws="$GITHUB_WORKSPACE"
          command -v cygpath >/dev/null && ws="$(cygpath -u "$GITHUB_WORKSPACE")"
          base="$ws/apps/desktop/src-tauri/target/release/bundle"
          ls -la "$base"/nsis 2>/dev/null || true
          mapfile -t files < <(find "$base" -type f \( -name '*.nsis.zip' -o -name '*.nsis.zip.sig' -o -name '*.AppImage.sig' \))
          echo "found ${#files[@]} updater files: ${files[*]}"
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ github.event.inputs.tag_name || github.ref_name }}" "${files[@]}" --clobber --repo Weeredjs/Weered-releases
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PUBLISH_TOKE }}
