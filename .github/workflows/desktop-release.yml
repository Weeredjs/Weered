name: Desktop Release

# Triggers on git tag pushes shaped like `desktop-v0.2.0` so we don't fire
# the workflow on unrelated tags. Manual `workflow_dispatch` is also allowed
# for testing.
on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          # macOS builds intentionally disabled for v0.1.x — see #TODO-mac.
          # Re-enable by adding back macos-latest entries with aarch64 +
          # x86_64 targets. Mac users can use the PWA install path until
          # the native shell ships.

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        # Must run BEFORE setup-node — setup-node@v5 auto-caches pnpm if it
        # finds a lockfile, and needs pnpm already on PATH to do that.
        # Version is read from package.json's "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target dir
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build + bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # GitHub-issued token — used by tauri-action to create the Release
          # and upload installer assets. GitHub provides this automatically;
          # no manual secret needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — required for auto-update to work.
          # Generate locally with: pnpm tauri signer generate
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing (optional — leave secrets empty to skip).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          # Use pnpm instead of the action's default npm — our monorepo is pnpm.
          tauriScript: pnpm tauri
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: "Weered Desktop ${{ github.event.inputs.tag_name || github.ref_name }}"
          releaseBody: |
            Automated build via GitHub Actions.

            See https://weered.ca/desktop for installation instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
