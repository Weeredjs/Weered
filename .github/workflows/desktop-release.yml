name: Desktop Release

# Triggers on git tag pushes shaped like `desktop-v0.2.0` so we don't fire
# the workflow on unrelated tags. Manual `workflow_dispatch` is also allowed
# for testing.
on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          # macOS builds intentionally disabled for v0.1.x — see #TODO-mac.
          # Re-enable by adding back macos-latest entries with aarch64 +
          # x86_64 targets. Mac users can use the PWA install path until
          # the native shell ships.

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        # Must run BEFORE setup-node — setup-node@v5 auto-caches pnpm if it
        # finds a lockfile, and needs pnpm already on PATH to do that.
        # Version is read from package.json's "packageManager" field.
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target dir
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      # ── Build, sign, and publish ───────────────────────────
      # The source repo is public, so tauri-action creates the Release here
      # (Weeredjs/Weered) and uploads installers + signed updater bundles
      # (.nsis.zip + .sig) + latest.json in one in-process step. The signed
      # bundles are short-lived build artifacts cleaned between steps, so a
      # later hand-rolled upload (softprops/gh) misses them. Letting
      # tauri-action own the upload is the only reliable path. (Releases
      # moved off the separate Weered-releases repo once the source repo
      # went public, 2026-06-17.)
      - name: Build, sign + publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # Default token is fine — this step doesn't create a release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — REQUIRED for .sig file generation.
          # Without these the auto-updater never gets valid signatures.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: "Weered Desktop ${{ github.event.inputs.tag_name || github.ref_name }}"
          releaseBody: |
            Automated build via GitHub Actions.

            See https://weered.ca/desktop for installation instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
