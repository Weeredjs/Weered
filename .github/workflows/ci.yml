name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (types for the API type gate)
        run: cd apps/api && pnpm prisma generate
      - name: Guardrails (API type gate + file-size tripwire)
        run: bash scripts/check.sh
      - name: Web build (Next.js type gate)
        run: cd apps/web && pnpm next build
      - name: Unit tests
        run: pnpm --filter @weered/api test:unit
      - name: Lint (non-blocking)
        run: pnpm -w lint
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weered
          POSTGRES_PASSWORD: weered
          POSTGRES_DB: weered_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # DB name contains "test" -> passes the integration safety gate in
      # apps/api/test/integration/setup.ts (which refuses non-test databases).
      DATABASE_URL: postgresql://weered:weered@localhost:5432/weered_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate
      - name: Push schema to the test database
        run: cd apps/api && pnpm prisma db push --skip-generate
      - name: Integration tests (Fastify inject against Postgres)
        run: pnpm --filter @weered/api test:integration
